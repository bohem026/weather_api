<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>초단기 예보</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="css/datepicker.material.css" />
    <script src="datepicker.js"></script>
  </head>
  <body>
    <div class="container">
      <h1>초단기 예보</h1>
      <form action="" id="dateForm">
        <input type="text" id="datepicker" />
        <button>조회</button>
      </form>
      <table class="table table-hover">
        <thead>
          <tr>
            <th scope="col">발표일자</th>
            <th scope="col">시간</th>
            <th scope="col">온도</th>
            <th scope="col">습도</th>
          </tr>
        </thead>
        <tbody id="target">
          <!-- <tr>
            <th scope="row">1</th>
            <td>Mark</td>
            <td>Otto</td>
            <td>@mdo</td>
          </tr> -->
        </tbody>
      </table>
    </div>
    <script>
      const dateForm = document.querySelector("#dateForm");
      const datePicker = document.querySelector("#datepicker");
      const target = document.querySelector("#target");
      let datepicker = new Datepicker("#datepicker", {
        // 1 day in the past
        min: (() => {
          let date = new Date();
          date.setDate(date.getDate() - 2);
          return date;
        })(),

        // today
        max: (() => {
          let date = new Date();
          date.setDate(date.getDate());
          return date;
        })(),
      });

      dateForm.addEventListener("submit", (e) => {
        e.preventDefault();
        console.log(datePicker.value); // 2026. 5. 22. --> 20260522
        let formatDate = datePicker.value
          .replace(/\./g, "") // .만 제거
          .trim()
          .split(/\s+/)
          .map((v, i) => (i === 0 ? v : String(v).padStart(2, "0")))
          .join("");

        console.log(formatDate); // 20260522
      });

      fetch(
        "https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0/getUltraSrtFcst?serviceKey=458447a5ba7c30ce8d45c471c2cff5e05b37c43a9a712708405c2200d61ff01c&pageNo=1&numOfRows=1000&dataType=JSON&base_date=20260522&base_time=0630&nx=55&ny=127",
      )
        .then((res) => {
          console.log(res);
          return res.json(); //json -> js object 변환, 다음 then으로 전달
        })
        .then((result) => {
          let data = result.response.body.items.item;
          console.log(data);
          let t1hArr = data.filter((d) => d.category === "T1H"); // 온도
          let rehArr = data.filter((d) => d.category === "REH"); // 습도

          console.log(t1hArr);
          console.log(rehArr);
          let tableData = "";
          t1hArr.forEach((data, idx) => {
            // 데이터가 없으면 -
            let rehData = rehArr[i]?.fcstValue || "-";
            tableData += `<tr>
              <th scope="row">${data.baseDate}</th>
              <td>${data.fcstTime}</td>
              <td>${data.fcstValue}</td>
              <td>${rehArr[idx].fcstValue}</td>
            </tr>`;
          });
          target.innerHTML = tableData;
        });
    </script>
  </body>
</html>
